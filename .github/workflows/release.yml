name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore packages
      run: nuget restore MDViewer.sln

    - name: Build Release
      run: msbuild MDViewer.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Install Inno Setup
      run: choco install innosetup --no-progress -y

    - name: Build And Package Assets
      shell: pwsh
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        $portableDir = "MDViewer-v$version-Portable"
        $artifactsDir = "artifacts"
        $outputDir = "MDViewer\bin\Release"

        New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
        New-Item -ItemType Directory -Force -Path $artifactsDir | Out-Null

        Copy-Item "$outputDir\MDViewer.exe" -Destination $portableDir -Force
        Copy-Item "$outputDir\MDViewer.exe.config" -Destination $portableDir -Force
        Copy-Item "$outputDir\*.dll" -Destination $portableDir -Force

        Get-ChildItem $outputDir -Directory | ForEach-Object {
          Copy-Item $_.FullName -Destination $portableDir -Recurse -Force
        }

        $requiredPortableFiles = @(
          "MDViewer.exe",
          "MDViewer.exe.config",
          "Markdig.dll",
          "HtmlAgilityPack.dll",
          "Microsoft.Web.WebView2.Core.dll",
          "Microsoft.Web.WebView2.Wpf.dll",
          "System.Memory.dll",
          "it-IT\MDViewer.resources.dll"
        )

        foreach ($file in $requiredPortableFiles) {
          $path = Join-Path $portableDir $file
          if (!(Test-Path $path)) {
            throw "Portable incompleto: file mancante $file"
          }
        }

        $portableZip = Join-Path $artifactsDir "MDViewer-v$version-Portable.zip"
        Compress-Archive -Path "$portableDir\*" -DestinationPath $portableZip -Force

        $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
        if (!(Test-Path $iscc)) {
          throw "ISCC non trovato: $iscc"
        }

        & $iscc "/DMyAppVersion=$version" "Installer\MDViewer.iss"
        if ($LASTEXITCODE -ne 0) {
          throw "Build installer fallita"
        }

        $installerName = "MDViewer-Setup-$version.exe"
        $installerPath = Join-Path "Release" $installerName
        if (!(Test-Path $installerPath)) {
          $candidate = Get-ChildItem "Release\MDViewer-Setup-*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $candidate) {
            throw "Installer non trovato in Release\"
          }
          $installerPath = $candidate.FullName
          $installerName = $candidate.Name
        }

        Copy-Item $installerPath -Destination (Join-Path $artifactsDir $installerName) -Force

        $checksumFile = Join-Path $artifactsDir "MDViewer-v$version-SHA256.txt"
        $portableHash = (Get-FileHash $portableZip -Algorithm SHA256).Hash.ToLowerInvariant()
        $installerHash = (Get-FileHash (Join-Path $artifactsDir $installerName) -Algorithm SHA256).Hash.ToLowerInvariant()

        @(
          "$portableHash  $(Split-Path $portableZip -Leaf)"
          "$installerHash  $installerName"
        ) | Set-Content -Path $checksumFile -Encoding UTF8

        "RELEASE_VERSION=$version" >> $env:GITHUB_ENV

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: MDViewer ${{ github.ref_name }}
        body: |
          ## MDViewer ${{ github.ref_name }}

          ### Downloads
          - **Portable**: extract and run, no installation required
          - **Installer**: guided setup with optional Markdown file association
          - **SHA256**: checksums for attached files

          ### Source Code
          - Source archives are published automatically by GitHub (`Source code (zip)` and `Source code (tar.gz)`).

          ### Features
          - Local Markdown rendering with Markdig by default
          - Optional GitHub-Flavored Markdown rendering through the GitHub API
          - Print and PDF export
          - Recent files and auto reload on file changes
          - Theme and settings support
          - App language preference: Auto, Italian, or English
          - WebView2 based preview
          - Multi-language interface (IT/EN)
          
          ### Requirements
          - Windows 10+
          - .NET Framework 4.8
          - WebView2 Runtime
          - Internet connection only for GitHub API rendering
          
          ### Privacy Notice
          - Local Markdig rendering keeps Markdown content on your machine
          - GitHub API rendering sends Markdown content to GitHub for processing
          - Do not use GitHub API mode for sensitive documents unless that is acceptable for your workflow
        files: |
          artifacts/MDViewer-v*-Portable.zip
          artifacts/MDViewer-Setup-*.exe
          artifacts/MDViewer-v*-SHA256.txt
        draft: false
        prerelease: false
